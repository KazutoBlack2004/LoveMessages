<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi novia?</title>
    <style>
        /* Asegura que todo el contenido esté centrado en la pantalla */
    body, html {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: pink; /* Color de fondo de la página */
    }

    /* Estilos para el contenedor principal */
    .container {
        text-align: center;
    }

    /* Estilos para el título */
    .Titulo {
        font-size: 30px;
        margin-bottom: 20px;
        color: #333;
    }

    /* Estilos para los botones */
    .btn {
        font-size: 20px;
        padding: 15px 30px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        background-color: fuchsia; /* Color de fondo */
        color: white; /* Color del texto */
        cursor: pointer;
        transition: background-color 0.3s, transform 0.3s;
    }

    .btn:hover {
        background-color: #e61980; /* Color de fondo al pasar el ratón por encima */
        transform: scale(1.05); /* Efecto de escala al pasar el ratón por encima */
    }

    .btn:active {
        background-color: #b81466; /* Color de fondo al hacer clic */
        transform: scale(0.95); /* Efecto de escala al hacer clic */
    }

        /* Estilos para la alerta personalizada */
        .custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 1000;
        }

        .custom-alert h2 {
            margin: 0 0 15px;
            font-size: 24px;
            color: #333;
        }

        .custom-alert button {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .custom-alert button:hover {
            background-color: #0056b3;
        }

        /* Estilos para el fondo oscuro */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

         /* Estilos para los corazones */
         .hearts {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            display: none; /* Oculto por defecto */
        }

        .heart {
            position: absolute;
            bottom: 0;
            pointer-events: none;
        }

        .heart:before,
        .heart:after {
            position: absolute;
            content: "";
            left: 50px;
            top: 0;
            width: 50px;
            height: 80px;
            background: #D00000;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            pointer-events: none;
        }

        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .a1 {
            left: 20%;
            transform: scale(0.6);
            opacity: 1;
            animation: slideUp 4s linear 1, sideSway 2s ease-in-out 4 alternate;
            animation-fill-mode: forwards;
            animation-delay: 0.7s;
        }

        .a2 {
            left: 55%;
            transform: scale(1);
            opacity: 1;
            animation: slideUp 5s linear 1, sideSway 4s ease-in-out 2 alternate;
            animation-fill-mode: forwards;
            animation-delay: 0.7s;
        }

        .a3 {
            left: 10%;
            transform: scale(0.8);
            opacity: 1;
            animation: slideUp 7s linear 1, sideSway 2s ease-in-out 6 alternate;
            animation-fill-mode: forwards;
            animation-delay: 0.7s;
        }
    </style>
      <script>
        function mostrarAlertaPersonalizada() {
            document.getElementById('customAlert').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            mostrarCorazones();
        }

        function cerrarAlertaPersonalizada() {
            document.getElementById('customAlert').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function mostrarCorazones() {
            document.querySelector('.hearts').style.display = 'block';
        }

        function mueveElBoton() {
            var btnNo = document.getElementById('btnNo');
            var x = Math.floor(Math.random() * (window.innerWidth - btnNo.offsetWidth));
            var y = Math.floor(Math.random() * (window.innerHeight - btnNo.offsetHeight));
            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>
</head>
<body>
    <div class="container">
        <div>
            <h3 class="Titulo">¿Quieres ser mi novia?</h3>
        </div>
        <div class="Botones">
            <input type="button" class="btn" onclick="mostrarAlertaPersonalizada()" id="btnSi" value="Sí" />
            <input type="button" class="btn" id="btnNo" onmouseover="mueveElBoton()" value="No" />
        </div>
    </div>

    <!-- Fondo oscuro -->
    <div id="overlay" class="overlay"></div>

    <!-- Alerta personalizada -->
    <div id="customAlert" class="custom-alert">
        <h2>¡Ella dijo que sí!</h2>
        <button onclick="cerrarAlertaPersonalizada()">Cerrar</button>
    </div>

    <!-- Corazones animados -->
    <div class="hearts">
        <div class="heart a1"></div>
        <div class="heart a2"></div>
        <div class="heart a3"></div>
    </div>
</body>
</html>
